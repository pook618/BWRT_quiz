<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Assessment Portal - Harbin Research</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 450px; border-top: 6px solid #d93025; }
        h2 { color: #202124; margin-bottom: 10px; }
        .warning-box { background: #fff4f2; border: 1px solid #d93025; padding: 15px; border-radius: 8px; color: #d93025; font-size: 14px; margin-bottom: 20px; text-align: left; }
        input { width: 90%; padding: 12px; margin-bottom: 20px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; }
        button { background: #1a73e8; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #1765cc; }
        .footer { margin-top: 15px; font-size: 11px; color: #70757a; }
    </style>
</head>
<body oncontextmenu="handleRightClick(event)">

<div class="card">
    <h2>Secure Research Portal</h2>
    <div class="warning-box">
        <strong>SECURITY RULES:</strong>
        <ul>
            <li>Right-click & Copying are <strong>PROHIBITED</strong>.</li>
            <li>Tab/Window switching is <strong>LOGGED</strong>.</li>
            <li>Violations will appear in the research data.</li>
        </ul>
    </div>
    
    <input type="text" id="studentName" placeholder="Full Name (Required)" required>
    <br>
    <button onclick="launchQuiz()">START ASSESSMENT</button>
    <div class="footer">Monitoring Active for Aaron Pook's Research Project</div>
</div>

<script>
    let activityLog = [];
    let quizWindow;

    // 1. CONFIGURATION: Paste your pre-filled link ending with "=" here
    const baseFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfG99wu-Mv9ebU3rl1JvsiWB6aV36aqSF21xnaDjDAlNIacMA/viewform?usp=pp_url&entry.2060872989=LOG_GOES_HERE";
    
    // 2. CONFIGURATION: Paste your entry ID here
    const entryID = "entry.1234567";

    function launchQuiz() {
        const name = document.getElementById('studentName').value;
        if (!name) { 
            alert("Please enter your name to begin."); 
            return; 
        }

        activityLog.push(`[${new Date().toLocaleTimeString()}] Quiz started by ${name}`);
        
        // Open Quiz in a new window
        quizWindow = window.open(baseFormUrl, 'QuizWindow', 'width=1100,height=850,menubar=no,toolbar=no,location=no');

        // Monitoring Loop
        const monitor = setInterval(() => {
            if (!quizWindow || quizWindow.closed) {
                clearInterval(monitor);
                return;
            }

            // Detect if the user clicks back onto THIS portal tab (leaving the quiz window)
            if (document.hasFocus()) {
                recordViolation("TAB_OR_WINDOW_SWITCH");
                alert("⚠️ SECURITY ALERT: You left the quiz window. This has been logged.");
                syncLog();
            }
        }, 1000);
    }

    function recordViolation(type) {
        let time = new Date().toLocaleTimeString();
        activityLog.push(`[${time}] ${type}`);
    }

    function syncLog() {
        if (quizWindow && !quizWindow.closed) {
            const currentLog = encodeURIComponent(activityLog.join(" | "));
            quizWindow.location.href = baseFormUrl + currentLog;
        }
    }

    // INTERCEPT RIGHT CLICK
    function handleRightClick(e) {
        e.preventDefault();
        recordViolation("RIGHT_CLICK_ATTEMPT");
        alert("❌ PROHIBITED: Right-click is not allowed. Violation logged.");
        syncLog();
    }

    // INTERCEPT COPY (Ctrl+C)
    document.addEventListener('copy', function(e) {
        e.preventDefault();
        recordViolation("COPY_ATTEMPT");
        alert("❌ PROHIBITED: Copying content is not allowed. Violation logged.");
        syncLog();
    });

    // INTERCEPT KEYBOARD SHORTCUTS
    document.onkeydown = function(e) {
        if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'u' || e.key === 's')) {
            e.preventDefault();
            recordViolation("KEYBOARD_SHORTCUT_" + e.key.toUpperCase());
            alert("❌ SECURITY: Shortcut " + e.key.toUpperCase() + " is disabled.");
            syncLog();
            return false;
        }
    };
</script>

</body>
</html>
