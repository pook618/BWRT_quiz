<script>
    let activityLog = [];
    let quizWindow;

    // REPLACE with your Pre-filled link (ending with your entry ID and =)
    const baseFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfG99wu-Mv9ebU3rl1JvsiWB6aV36aqSF21xnaDjDAlNIacMA/viewform?usp=pp_url&entry.2060872989=LOG_GOES_HEREs";

    function launchQuiz() {
        const name = document.getElementById('studentName').value;
        if (!name) { alert("Please enter your name first."); return; }

        activityLog.push(`[${new Date().toLocaleTimeString()}] Quiz started by ${name}`);
        
        // Open Quiz in a new window
        quizWindow = window.open(baseFormUrl, 'QuizWindow', 'width=1100,height=850,menubar=no');

        // Monitoring Loop
        const monitor = setInterval(() => {
            if (!quizWindow || quizWindow.closed) {
                clearInterval(monitor);
                return;
            }

            // DETECT WINDOW BLUR (If they leave the Quiz window)
            if (document.hasFocus()) {
                recordViolation("TAB/WINDOW SWITCH");
                alert("⚠️ SECURITY VIOLATION: You have left the quiz window. This attempt is logged.");
                
                // Sync the log to the form
                const currentLog = encodeURIComponent(activityLog.join(" | "));
                quizWindow.location.href = baseFormUrl + currentLog;
            }
        }, 1000);
    }

    function recordViolation(type) {
        let time = new Date().toLocaleTimeString();
        activityLog.push(`[${time}] ${type}`);
    }

    // 1. BLOCK RIGHT-CLICK COMPLETELY
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        recordViolation("RIGHT-CLICK ATTEMPTED");
        alert("Right-click is disabled for research integrity.");
    }, false);

    // 2. BLOCK COPY/PASTE/CUT SHORTCUTS
    document.addEventListener('keydown', function(e) {
        // Blocks Ctrl+C, Ctrl+V, Ctrl+X, Ctrl+U (View Source), F12 (Dev Tools)
        if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'x' || e.key === 'u' || e.key === 's') || e.keyCode === 123) {
            e.preventDefault();
            recordViolation("KEYBOARD SHORTCUT: " + e.key);
            alert("This shortcut is disabled during the assessment.");
            return false;
        }
    });

    // 3. BLOCK PRINT SCREEN
    document.addEventListener('keyup', function(e) {
        if (e.key === 'PrintScreen') {
            navigator.clipboard.writeText(''); // Clear clipboard
            alert('Screenshots are prohibited.');
        }
    });
</script>
