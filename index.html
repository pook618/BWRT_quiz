<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Assessment Portal</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 100%; 
            max-width: 400px; 
            border-top: 5px solid #d93025;
        }
        h2 { color: #202124; margin-bottom: 20px; }
        .rules { 
            text-align: left; 
            background: #fff4f2; 
            padding: 15px; 
            border-radius: 8px; 
            color: #d93025; 
            font-size: 14px; 
            margin-bottom: 20px; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #dadce0; 
            border-radius: 4px; 
            box-sizing: border-box;
            font-size: 16px;
        }
        button { 
            background-color: #1a73e8; 
            color: white; 
            border: none; 
            padding: 15px 20px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%;
            font-size: 16px;
        }
        button:hover { background-color: #1765cc; }
    </style>
</head>
<body oncontextmenu="return showError('Right-click')">

    <div class="container">
        <h2>Secure Exam Portal</h2>
        <div class="rules">
            <strong>Security Rules Active:</strong>
            <ul>
                <li>No Right-Click or Copying.</li>
                <li>No Tab/Window switching.</li>
                <li>Activity is logged to Aaron Pook.</li>
            </ul>
        </div>

        <input type="text" id="studentName" placeholder="Enter Full Name" required>
        <button id="startBtn" onclick="launchQuiz()">START ASSESSMENT</button>
    </div>

    <script>
        let activityLog = [];
        let quizWindow;

        // --- CONFIGURATION ---
        // 1. Paste your link ending with '='
        const baseFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfG99wu-Mv9ebU3rl1JvsiWB6aV36aqSF21xnaDjDAlNIacMA/viewform?usp=pp_url&entry.2060872989=LOG_GOES_HERE";
        // 2. Paste your entry ID (e.g. entry.123456)
        const entryID = "entry.1234567";
        // ---------------------

        function launchQuiz() {
            const name = document.getElementById('studentName').value;
            if (!name) {
                alert("Please enter your name to start.");
                return;
            }

            activityLog.push(`[${new Date().toLocaleTimeString()}] Quiz started by ${name}`);
            
            // Open Quiz
            quizWindow = window.open(baseFormUrl, 'QuizWindow', 'width=1100,height=850');

            // Monitoring Loop
            setInterval(() => {
                if (quizWindow && !quizWindow.closed && document.hasFocus()) {
                    logViolation("TAB_SWITCH");
                    alert("⚠️ WARNING: You left the quiz window. This violation is logged.");
                    syncLog();
                }
            }, 1000);
        }

        function logViolation(type) {
            activityLog.push(`[${new Date().toLocaleTimeString()}] ${type}`);
        }

        function syncLog() {
            if (quizWindow && !quizWindow.closed) {
                const fullLog = encodeURIComponent(activityLog.join(" | "));
                quizWindow.location.href = baseFormUrl + fullLog;
            }
        }

        function showError(type) {
            logViolation(type + "_ATTEMPT");
            alert("❌ " + type + " is disabled. Event logged.");
            syncLog();
            return false;
        }

        // Global Event Listeners
        document.addEventListener('copy', (e) => { e.preventDefault(); showError('Copy'); });
        document.onkeydown = (e) => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'u')) {
                e.preventDefault();
                showError('Shortcut');
            }
        };
    </script>
</body>
</html>
