<script>
    let activityLog = [];
    let quizWindow;

    // REPLACE with your Pre-filled link (ending with your entry ID and =)
    const baseFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfG99wu-Mv9ebU3rl1JvsiWB6aV36aqSF21xnaDjDAlNIacMA/viewform?usp=pp_url&entry.2060872989=LOG_GOES_HERE";

    function launchQuiz() {
        const name = document.getElementById('studentName').value;
        if (!name) { alert("Please enter your name first."); return; }

        activityLog.push(`[${new Date().toLocaleTimeString()}] Quiz started by ${name}`);
        
        // Open Quiz in a new window
        quizWindow = window.open(baseFormUrl, 'QuizWindow', 'width=1100,height=850,menubar=no');

        // Monitoring Loop
        const monitor = setInterval(() => {
            if (!quizWindow || quizWindow.closed) {
                clearInterval(monitor);
                return;
            }

            // Detect if they have returned to the portal (meaning they left the quiz)
            if (document.hasFocus()) {
                recordViolation("TAB_SWITCH / OUTSIDE_CLICK");
                alert("⚠️ SECURITY ALERT: You left the quiz window. This event is being recorded in Aaron Pook's database.");
                syncLog();
            }
        }, 1000);
    }

    function recordViolation(type) {
        let time = new Date().toLocaleTimeString();
        activityLog.push(`[${time}] ${type}`);
    }

    function syncLog() {
        if (quizWindow && !quizWindow.closed) {
            const currentLog = encodeURIComponent(activityLog.join(" | "));
            quizWindow.location.href = baseFormUrl + currentLog;
        }
    }

    // 1. POP-UP ALERT FOR RIGHT CLICK
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        recordViolation("RIGHT_CLICK_ATTEMPT");
        alert("❌ PROHIBITED: Right-click is not allowed. Violation logged.");
        syncLog();
    }, false);

    // 2. POP-UP ALERT FOR COPY (Ctrl+C)
    document.addEventListener('copy', function(e) {
        e.preventDefault();
        recordViolation("COPY_ATTEMPT");
        alert("❌ PROHIBITED: Copying content is not allowed. Violation logged.");
        syncLog();
    });

    // 3. BLOCK KEYBOARD SHORTCUTS
    document.onkeydown = function(e) {
        if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'u')) {
            e.preventDefault();
            recordViolation("SHORTCUT_USED_" + e.key.toUpperCase());
            alert("❌ SECURITY NOTICE: Keyboard shortcuts are disabled. Log updated.");
            syncLog();
            return false;
        }
    };
</script>
